name: Generate Letters

on:
  schedule:
    # 月曜 5:00 JST = 日曜 20:00 UTC
    - cron: '0 20 * * 0'
  workflow_dispatch: # 手動実行用

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout collector
        uses: actions/checkout@v4

      - name: Clone seven-letters
        run: |
          git clone https://x-access-token:${{ secrets.FAN_BOARD_TOKEN }}@github.com/hasyamo/seven-letters.git ../seven-letters

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate letters
        env:
          DATA_DIR: ${{ github.workspace }}/data
          SEVEN_LETTERS_DATA: ${{ github.workspace }}/../seven-letters/data
        run: python seven-letters/generate.py

      - name: Push to seven-letters
        run: |
          cd ../seven-letters
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "💌 $(TZ=Asia/Tokyo date +%Y-%m-%d) letters" && git push)
