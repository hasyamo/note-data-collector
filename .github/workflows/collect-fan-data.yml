name: Collect Fan Data

on:
  schedule:
    # 5:00 JST = 20:00 UTC前日
    - cron: '0 20 * * *'
    # 9:00 JST = 0:00 UTC
    - cron: '0 0 * * *'
    # 13:00 JST = 4:00 UTC
    - cron: '0 4 * * *'
    # 17:00 JST = 8:00 UTC
    - cron: '0 8 * * *'
    # 21:00 JST = 12:00 UTC
    - cron: '0 12 * * *'
    # 1:00 JST = 16:00 UTC
    - cron: '0 16 * * *'
  workflow_dispatch: # 手動実行用

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout collector
        uses: actions/checkout@v4

      - name: Clone note-fan-board
        run: |
          git clone https://x-access-token:${{ secrets.FAN_BOARD_TOKEN }}@github.com/hasyamo/note-fan-board.git ../note-fan-board

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync existing data from note-fan-board
        run: |
          if [ -d ../note-fan-board/data ]; then
            rsync -a ../note-fan-board/data/ data/
          fi

      - name: Collect data
        env:
          TESTERS_TXT: fan-board/testers.txt
        run: python scripts/collect.py

      - name: Commit data to collector
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "📊 $(TZ=Asia/Tokyo date +%Y-%m-%d) data" && git push)

      - name: Copy data to note-fan-board and push
        run: |
          cd ../note-fan-board
          git pull --rebase
          cd -
          rsync -a --delete data/ ../note-fan-board/data/
          cd ../note-fan-board
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "📊 $(TZ=Asia/Tokyo date +%Y-%m-%d) fan data" && git push)
